set -a terminal-features "tmux-256color:RGB"
set -g prefix C-a
bind C-a send-prefix
# bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
set -g base-index 1
set -g renumber-windows on
set -g pane-base-index 1
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style 'fg=color8 bg=default'
set -g status-left '#S'
set -g status-left-style 'fg=color8'
set -g status-left-length 100
set -g status-right ''
set -g status-right-length 0
setw -g window-status-style 'fg=color8'
setw -g window-status-current-style 'fg=colour6 bg=default bold'
setw -g window-status-current-format '#I:#W '
setw -g window-status-format '#I:#W '

bind r source-file "~/.config/tmux/tmux.conf"
bind b set -g status
bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind g run "~/.config/scripts/open-github.sh"
bind N run "~/.config/scripts/tmux-session-dispensary.sh ~/Documents"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/Projects"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"
# bind H run "~/.config/scripts/tmux-session-dispensary.sh ~"
bind-key -T prefix o select-pane -t :.+
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi Escape send -X cancel

